<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>🌏 Asia 2026 — Lucas & Caitlin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --blue:#007AFF;--blue-bg:#EBF5FF;--blue-mid:#3395FF;
  --green:#34C759;--green-bg:#E8FBF0;
  --amber:#FF9500;--amber-bg:#FFF3E0;
  --red:#FF3B30;
  --text:#1C1C1E;--text2:#6E6E73;--text3:#AEAEB2;
  --bg:#F2F2F7;--card:#FFFFFF;--border:#E5E5EA;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --r:16px;--r-sm:10px;--nav:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:15px}

/* ─── MAP ─── */
#map{position:fixed;inset:0;bottom:var(--nav);z-index:1}
.leaflet-control-attribution{font-size:9px!important}

/* ─── BOTTOM SHEET ─── */
#sheet{
  position:fixed;left:0;right:0;bottom:var(--nav);z-index:300;
  background:var(--card);border-radius:20px 20px 0 0;
  box-shadow:var(--shadow-lg);
  transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);
  max-height:90vh;display:flex;flex-direction:column;
}
#sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#D1D1D6;border-radius:2px;margin:12px auto 0;flex-shrink:0}
#sheet-head{padding:12px 16px 10px;flex-shrink:0}
.sh-top{display:flex;align-items:center;gap:10px}
.sh-flag{font-size:30px}
.sh-info{flex:1}
.sh-name{font-size:20px;font-weight:800;color:var(--text)}
.sh-dates{font-size:13px;color:var(--text2);margin-top:1px}
.sh-badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff}
.sh-close{width:32px;height:32px;border-radius:50%;background:var(--border);border:none;font-size:16px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.sh-hotel{display:flex;align-items:center;gap:8px;margin-top:10px;padding:9px 12px;background:var(--green-bg);border-radius:var(--r-sm)}
.sh-hotel-icon{font-size:16px}
.sh-hotel-text{font-size:12.5px;font-weight:600;color:#1B5E20}
#sheet-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 4px;flex-shrink:0;overflow-x:auto}
#sheet-tabs::-webkit-scrollbar{display:none}
.stab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text2);border:none;background:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s}
.stab.on{color:var(--blue);border-bottom-color:var(--blue)}
#sheet-body{overflow-y:auto;flex:1;padding:14px 14px 6px}

/* ─── CARDS ─── */
.t-content{display:none}
.t-content.on{display:block}
.card{
  background:var(--card);border-radius:12px;padding:16px;
  margin-bottom:12px;box-shadow:var(--shadow);
  display:flex;gap:12px;
}
.card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-type{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.card-desc{font-size:12.5px;color:var(--text2);line-height:1.55}
.order-box{margin-top:8px;padding:7px 9px;background:var(--blue-bg);border-radius:8px}
.order-label{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--blue);text-transform:uppercase;margin-bottom:2px;display:block}
.order-text{font-size:12px;color:#1C3A6B;font-weight:500;line-height:1.4}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.price-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;background:#F0FDF4;border-radius:20px;font-size:12px;font-weight:700;color:#166534}
.map-link{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:var(--blue);text-decoration:none;padding:3px 9px;background:var(--blue-bg);border-radius:20px}

/* Transport cards */
.tc{background:var(--card);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:flex-start}
.tc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tc-dot.confirmed{background:var(--green)}.tc-dot.tbc{background:var(--amber)}.tc-dot.alt{background:var(--text3)}
.tc-body{flex:1}.tc-method{font-size:13px;font-weight:700}.tc-detail{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5}
.tc-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0}
.tc-badge.confirmed{background:var(--green-bg);color:#166534}.tc-badge.tbc{background:var(--amber-bg);color:#7A4000}.tc-badge.alt{background:var(--bg);color:var(--text2)}
.next-dest{background:var(--blue-bg);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.next-icon{font-size:22px}.next-name{font-size:14px;font-weight:700;color:#1C3A6B}
.sec-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin:14px 0 8px;padding-left:2px}
.sec-label:first-child{margin-top:0}

/* ─── BOTTOM NAV ─── */
#nav{
  position:fixed;left:0;right:0;bottom:0;height:var(--nav);z-index:400;
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;gap:4px;border:none;background:none;cursor:pointer;
  padding:0 0 env(safe-area-inset-bottom,0px);
  color:var(--text3);font-size:10.5px;font-weight:600;transition:.15s;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.nav-btn.active{color:var(--blue)}.nav-btn.active svg{stroke:var(--blue)}.nav-btn.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--blue);border-radius:0 0 3px 3px}

/* ─── FULL PANELS ─── */
.full-panel{
  position:fixed;left:0;right:0;top:0;bottom:var(--nav);z-index:200;
  background:var(--bg);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.full-panel.open{transform:translateY(0)}
.panel-head{padding:16px 16px 8px;background:var(--card);box-shadow:0 1px 0 var(--border);flex-shrink:0}
.panel-head h1{font-size:22px;font-weight:800}
.panel-head p{font-size:13px;color:var(--text2);margin-top:2px}
.panel-scroll{overflow-y:auto;flex:1;padding:14px}

/* ─── ITINERARY ─── */
.tl-item{background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.tl-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;user-select:none}
.tl-num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.tl-meta{flex:1}
.tl-city{font-size:14px;font-weight:700}
.tl-date{font-size:12px;color:var(--text2);margin-top:1px}
.tl-chevron{color:var(--text3);font-size:14px;transition:transform .2s}
.tl-chevron.open{transform:rotate(90deg)}
.tl-body{display:none;border-top:1px solid var(--border)}
.tl-body.open{display:block}
.tl-slot{display:flex;gap:12px;padding:11px 14px;border-bottom:1px solid #F2F2F7}
.tl-slot:last-child{border-bottom:none}
.tl-time{font-size:11px;font-weight:600;color:var(--text3);width:68px;flex-shrink:0;padding-top:1px}
.tl-slot-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-slot-desc{font-size:12px;color:var(--text2);line-height:1.5}
.tl-tip{margin:0 14px 12px;padding:9px 11px;background:#FFFBEB;border-radius:10px;font-size:12px;color:#7A4000;border-left:3px solid var(--amber)}

/* ─── INFO TABS ─── */
.info-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 4px;overflow-x:auto;flex-shrink:0}
.info-tabs::-webkit-scrollbar{display:none}
.itab{padding:11px 14px;font-size:13px;font-weight:600;color:var(--text2);border:none;background:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s}
.itab.on{color:var(--blue);border-bottom-color:var(--blue)}
.it-content{display:none}.it-content.on{display:block}
.em-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.em-head{padding:11px 14px;background:#FEF2F2;display:flex;align-items:center;gap:8px}
.em-head h4{font-size:13px;font-weight:700;color:#7F1D1D}
.em-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #F2F2F7}
.em-row:last-child{border-bottom:none}
.em-label{font-size:12.5px;color:var(--text2)}
.em-num{font-size:13px;font-weight:700;color:var(--red);text-decoration:none}
.sim-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.sim-head{padding:11px 14px;background:#EFF6FF;display:flex;align-items:center;gap:8px}
.sim-head h4{font-size:13px;font-weight:700;color:#1E3A8A}
.sim-row{padding:10px 14px;border-bottom:1px solid #F2F2F7;font-size:12.5px;color:var(--text2);line-height:1.55}
.sim-row:last-child{border-bottom:none}
.sim-row strong{color:var(--text);font-weight:600}
.phrase-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.phrase-head{padding:11px 14px;background:#F5F3FF;display:flex;align-items:center;gap:8px}
.phrase-head h4{font-size:13px;font-weight:700;color:#4C1D95}
.phrase-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 14px;border-bottom:1px solid #F2F2F7;gap:10px}
.phrase-row:last-child{border-bottom:none}
.phrase-eng{font-size:12.5px;color:var(--text2);flex:1}
.phrase-right{text-align:right}
.phrase-local{font-size:12.5px;font-weight:600;color:var(--text)}
.phrase-pron{font-size:11px;color:#6D28D9;margin-top:1px}

/* ─── BOOKINGS ─── */
.bk-section{margin-bottom:18px}
.bk-section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bk-section-icon{font-size:16px}
.bk-section-title{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.bk-section-count{margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.bk-section-count.confirmed{background:var(--green-bg);color:#166534}
.bk-section-count.tbc{background:var(--amber-bg);color:#7A4000}
.bk-section-count.mixed{background:var(--bg);color:var(--text2)}

/* Flight card */
.fk-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.fk-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.fk-airline{font-size:12px;font-weight:600;color:var(--text2)}
.fk-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px}
.fk-pill.confirmed{background:var(--green-bg);color:#166534}
.fk-pill.tbc{background:var(--amber-bg);color:#92400E}
.fk-route{display:flex;align-items:center;padding:10px 14px 4px;gap:0}
.fk-city{flex:1}
.fk-code{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.fk-city-name{font-size:11px;color:var(--text2);margin-top:2px}
.fk-terminal{font-size:10px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:2px 5px;border-radius:5px;display:inline-block;margin-top:3px}
.fk-mid{flex:0 0 auto;text-align:center;padding:0 10px}
.fk-dur{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:3px}
.fk-arrow{display:flex;align-items:center;gap:3px}
.fk-line{height:1.5px;width:32px;background:var(--border)}
.fk-arrowhead{color:var(--text3);font-size:12px;line-height:1}
.fk-nonstop{font-size:9px;color:var(--text3);margin-top:3px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.fk-times{display:flex;justify-content:space-between;padding:6px 14px 0}
.fk-time-block{text-align:left}
.fk-time-block:last-child{text-align:right}
.fk-time{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
.fk-date{font-size:11px;color:var(--text2);margin-top:1px}
.fk-divider{height:1px;background:var(--border);margin:10px 14px 0}
.fk-details{padding:10px 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
.fk-detail-item{}
.fk-detail-label{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.fk-detail-val{font-size:12px;font-weight:600;color:var(--text);line-height:1.45}
.fk-ref{background:var(--bg);border-radius:var(--r-sm);padding:8px 14px;margin:0 14px 12px;display:flex;align-items:center;justify-content:space-between}
.fk-ref-label{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text3)}
.fk-ref-val{font-size:15px;font-weight:800;color:var(--text);letter-spacing:1.5px}

/* Train / ferry card */
.tk-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--shadow);padding:12px 14px}
.tk-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tk-type{display:flex;align-items:center;gap:7px}
.tk-icon{font-size:18px}
.tk-name{font-size:13px;font-weight:700}

/* Hotel card */
.hk-card{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow);padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.hk-icon{width:38px;height:38px;border-radius:10px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hk-body{flex:1}
.hk-city{font-size:14px;font-weight:700}
.hk-dates{font-size:12px;color:var(--text2);margin-top:2px}
.hk-detail{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
.hk-ref{font-size:11px;font-weight:600;color:var(--text3);margin-top:4px}
.hk-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.hk-pill.confirmed{background:var(--green-bg);color:#166534}
.hk-pill.tbc{background:var(--amber-bg);color:#92400E}

/* Summary bar */
.bk-summary{background:var(--card);border-radius:var(--r);padding:12px 14px;margin-bottom:18px;box-shadow:var(--shadow);display:flex;gap:0}
.bk-sum-item{flex:1;text-align:center;border-right:1px solid var(--border)}
.bk-sum-item:last-child{border-right:none}
.bk-sum-num{font-size:22px;font-weight:800}
.bk-sum-label{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);margin-top:2px}

/* ─── MAP LEGEND ─── */
#legend{position:absolute;top:16px;right:12px;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow)}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px}
.leg:last-child{margin-bottom:0}
.leg-line{width:22px;height:3px;border-radius:2px}

/* ─── CITY COUNT CHIP ─── */
#trip-chip{position:absolute;top:16px;left:12px;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-radius:12px;padding:9px 14px;box-shadow:var(--shadow)}
.chip-title{font-size:13px;font-weight:700;color:var(--text)}
.chip-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* ─── CITY MARKER ─── */
.cmarker{width:32px;height:32px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.25);transition:transform .15s ease,box-shadow .15s ease}
.cmarker:hover{transform:scale(1.12)}
.cmarker:active{transform:scale(1.05)}
.cmarker.selected{transform:scale(1.28)!important;box-shadow:0 6px 20px rgba(0,0,0,.4);border-width:3.5px}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards}
@keyframes dotPulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}


/* ─── LOAD ANIMATIONS ─── */
@keyframes mapFadeIn{from{opacity:0}to{opacity:1}}
@keyframes pinDrop{0%{opacity:0;transform:translateY(-20px) scale(0.5)}65%{transform:translateY(4px) scale(1.18)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes navSlideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
#map{animation:mapFadeIn 0.4s ease forwards}
#nav{animation:navSlideUp 0.45s cubic-bezier(.32,.72,0,1) 0.2s both}
.cmarker.pin-drop{animation:pinDrop 0.45s cubic-bezier(.32,.72,0,1) both}
/* Sheet backdrop */
#sheet-backdrop{position:fixed;inset:0;z-index:299;background:rgba(0,0,0,0.32);pointer-events:none;opacity:0;transition:opacity .25s}
#sheet-backdrop.show{pointer-events:auto;opacity:1}
/* Trip chip pill */
.chip-pill{display:inline-flex;margin-top:5px;padding:2px 9px;background:var(--blue-bg);color:var(--blue);font-size:10px;font-weight:700;border-radius:20px;letter-spacing:0.04em}

/* ── FOOD MAP FEATURE ── */
.food-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.food-count{font-size:12px;font-weight:600;color:var(--text2)}
.food-toggle{display:flex;gap:4px}
.ftab{padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2)}
.ftab.on{background:var(--blue);color:#fff;border-color:transparent}
.card-area{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:2px}
.food-map-outer{padding:12px}
.food-map-el{height:290px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.food-map-detail{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.fmd-card{display:flex;gap:10px;padding:10px 12px;background:var(--card);border-radius:12px;box-shadow:var(--shadow);align-items:flex-start}
.fmd-num{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;margin-top:1px}
.fmd-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.fmd-title{font-size:13px;font-weight:700;margin-top:1px}
.fmd-row{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.fmd-price{font-size:11px;color:var(--text2)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#D1D1D6;border-radius:2px}
.hotel-strip{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(135deg,#1e3a5f 0%,#2563EB 100%);margin:0 0 6px;border-radius:0;border-bottom:2px solid rgba(255,255,255,.15)}
   .hs-icon{font-size:18px;flex-shrink:0}

      {icon:'🌊',bg:'#EFF6FF',area:'Nanbin Road',ll:[29.5486,106.5804],type:'Riverside Dining',title:'Nanbin Road Restaurant Strip',desc:'1.5km of restaurants along the south bank of the Yangtze. Spectacular city light reflections at night. Where locals eat on weekends.',order:'Chongqing grilled fish (烤鱼) — the whole fish baked in spicy tallow. Order the Yangtze river shrimp too.',price:'~NZ$22 pp'},

      {icon:'🍸',bg:'#1E1B4B',type:'Rooftop Bar · Night View',area:'CBD / Jiefangbei',title:'Canvas Bar (Raffles City Chongqing)',desc:"On the 350m skybridge connecting two Raffles towers — the most dramatic night view in China. You're literally floating above the Yangtze and Jialing river confluence. Moshe Safdie's masterpiece lit up below you.",order:'Signature cocktail + sharing platter. Book the outdoor rail spot. Come after 8pm when city lights peak',price:'~NZ$35 pp',ll:[29.5588,106.5763]},

      {icon:'🌆',bg:'#1E1B4B',type:'Viewpoint Bar',area:'Pipashan / Loquat Hill',title:'Pipashan Park Night Terrace',desc:"Chongqing's highest central park at 345m. The viewing platforms look straight down into the canyon city — the neon maze of elevated roads, stacked apartments and river below is unlike anywhere else on earth. Small cafés and beer stalls right at the viewpoint.",order:'Local Shancheng beer from a stall, snacks. Go after 8:30pm when all the neon is fully lit',price:'~NZ$5 pp',ll:[29.5580,106.5538]},

function arcPts(p1,p2,n=80){
  const dLat=p2[0]-p1[0],dLng=p2[1]-p1[1],dist=Math.sqrt(dLat*dLat+dLng*dLng),off=dist*.28;
  const cpLat=(p1[0]+p2[0])/2-(dLng/dist)*off,cpLng=(p1[1]+p2[1])/2+(dLat/dist)*off;
  return Array.from({length:n+1},(_,i)=>{const t=i/n;return[(1-t)*(1-t)*p1[0]+2*(1-t)*t*cpLat+t*t*p2[0],(1-t)*(1-t)*p1[1]+2*(1-t)*t*cpLng+t*t*p2[1]]});
}

function drawArc(pts,color,dashed,delay){
  // Ghost arc behind animated line
  L.polyline(pts,{color:'#007AFF',weight:1.5,opacity:.12,dashArray:'5,6'}).addTo(map);
  // Animated arc — accent blue at 60%, dashed
  const dash=dashed?'7,5':'4,4';
  const line=L.polyline([],{color:'#007AFF',weight:2,opacity:.6,dashArray:dash}).addTo(map);
  let i=1;
  setTimeout(()=>{
    const t=setInterval(()=>{if(i>pts.length){clearInterval(t);animateDot(pts,color);return;}line.setLatLngs(pts.slice(0,i));i+=2;},18);
  },delay);
}

function animateDot(pts,color){
  const dot=L.circleMarker(pts[0],{radius:4,color:'#fff',fillColor:color,fillOpacity:1,weight:2,interactive:false}).addTo(map);
  let i=0,dir=1;
  setInterval(()=>{
    dot.setLatLng(pts[Math.max(0,Math.min(pts.length-1,i))]);
    i+=dir;
    if(i>=pts.length-1||i<=0)dir*=-1;
  },40);
}

ROUTE.forEach(([a,b,tbc],i)=>drawArc(arcPts(COORDS[a],COORDS[b]),tbc?'#FF9500':'#34C759',tbc,400+i*200));

function setFoodView(view,btn,key){
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));

function haversineKm(a,b){
  const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function initFoodMap(key){
  const c=CITIES[key];if(!c||!c.food)return;
  const mapEl=document.getElementById('food-map-el');if(!mapEl)return;
  if(_foodMap){_foodMap.remove();_foodMap=null;}
  const items=c.food.filter(f=>f.ll&&f.ll.length===2);
  if(!items.length){mapEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:13px;background:var(--bg2)">📍 Map data coming soon</div>';return;}
  const hll=c.hotelll||null;
  const allPts=[...items.map(f=>f.ll),...(hll?[hll]:[])];
  const lat=allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
  const lng=allPts.reduce((s,p)=>s+p[1],0)/allPts.length;
  _foodMap=L.map(mapEl,{zoomControl:false}).setView([lat,lng],14);
  L.control.zoom({position:'topright'}).addTo(_foodMap);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© CartoDB'}).addTo(_foodMap);
  if(hll){
    const hotelIc=L.divIcon({className:'',html:`<div style="width:32px;height:32px;border-radius:8px;background:#1e3a5f;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:16px">🏨</div>`,iconSize:[32,32],iconAnchor:[16,16]});
    L.marker(hll,{icon:hotelIc}).addTo(_foodMap).bindPopup(`<b>Your Hotel</b><br><small>${c.hotel}</small>`);
  }
  const detailEl=document.getElementById('food-map-detail');detailEl.innerHTML='';
  items.forEach((f,i)=>{
    const n=i+1;
    const bg=f.bg||'#EFF6FF';
    const ic=L.divIcon({className:'',html:`<div style="width:26px;height:26px;border-radius:50%;background:${bg};border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#1a1a1a">${n}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    L.marker(f.ll,{icon:ic}).addTo(_foodMap).bindPopup(`<b>${f.title}</b><br><small>${f.type} · 💰 ${f.price}</small>`);
    const dist=hll?haversineKm(hll,f.ll):null;
    const distHtml=dist!=null?`<span class="fmd-dist">${dist<1?(dist*1000).toFixed(0)+'m':(dist).toFixed(1)+'km'}</span>`:'';
    detailEl.innerHTML+=`<div class="fmd-card"><div class="fmd-num">${n}</div><div style="flex:1"><div class="fmd-type">${f.icon} ${f.type}${f.area?' · '+f.area:''}</div><div class="fmd-title">${f.title}</div><div class="fmd-row"><span class="fmd-price">💰 ${f.price}</span>${distHtml}<a class="map-link" href="${mapsLink(f.title,c.name)}" target="_blank">📍 Maps</a></div></div></div>`;
  });
  setTimeout(()=>{if(_foodMap){_foodMap.invalidateSize();if(hll){const bounds=L.latLngBounds([hll,...items.map(f=>f.ll)]);_foodMap.fitBounds(bounds,{padding:[28,28]});}}},150);
}
function closeSheet(){if(_foodMap){_foodMap.remove();_foodMap=null;}document.getElementById('sheet').classList.remove('map-full');
  const s=document.getElementById('sheet');
  s.classList.remove('open');s.style.maxHeight='';s.dataset.state='';
  document.getElementById('sheet-backdrop').classList.remove('show');
  if(selectedMarkerEl){selectedMarkerEl.classList.remove('selected');selectedMarkerEl=null;}
}
const sh=document.getElementById('sheet');
let shDragY=0;
sh.addEventListener('touchstart',e=>{shDragY=e.touches[0].clientY;},{passive:true});
sh.addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-shDragY;
  const state=sh.dataset.state||'half';
  if(dy>80){
    if(state==='full'){sh.dataset.state='half';sh.style.maxHeight='60vh';}
    else{closeSheet();}
  } else if(dy<-70){
    if(state==='half'){sh.dataset.state='full';sh.style.maxHeight='90vh';}
  }
},{passive:true});

// ═══════════════════════════════════
// RENDER DAYS
// ═══════════════════════════════════
function renderDays(){
  document.getElementById('days-content').innerHTML=DAYS.map((d,i)=>`
    <div class="tl-item">
      <div class="tl-head" onclick="toggleDay(${i})">
        <div class="tl-num" style="background:${d.color}">${d.day}</div>
        <div class="tl-meta">
          <div class="tl-city">${d.emoji} ${d.city}</div>
          <div class="tl-date">${d.date}</div>
        </div>
        <span class="tl-chevron" id="tl-ch-${i}">›</span>
      </div>
      <div class="tl-body" id="tl-b-${i}">
        <div class="tl-slot"><div class="tl-time">🌅 Morning</div><div><div class="tl-slot-title">${d.morning.title}</div><div class="tl-slot-desc">${d.morning.desc}</div></div></div>
        <div class="tl-slot"><div class="tl-time">☀️ Afternoon</div><div><div class="tl-slot-title">${d.afternoon.title}</div><div class="tl-slot-desc">${d.afternoon.desc}</div></div></div>
        <div class="tl-slot"><div class="tl-time">🌙 Evening</div><div><div class="tl-slot-title">${d.evening.title}</div><div class="tl-slot-desc">${d.evening.desc}</div></div></div>
        <div class="tl-tip">${d.tip}</div>
      </div>
    </div>`).join('');
}
function toggleDay(i){
  const b=document.getElementById('tl-b-'+i),c=document.getElementById('tl-ch-'+i);
  const open=b.classList.toggle('open');
  c.classList.toggle('open',open);
}

// ═══════════════════════════════════
// RENDER INFO
// ═══════════════════════════════════
function renderInfo(){
  if(document.getElementById('it-emergency').hasChildNodes())return;
  document.getElementById('it-emergency').innerHTML=EMERGENCY.map(e=>`
    <div class="em-card">
      <div class="em-head"><h4>${e.country}</h4></div>
      ${e.items.map(i=>`<div class="em-row"><span class="em-label">${i.l}</span><a class="em-num" href="tel:${i.n}">${i.n}</a></div>`).join('')}
    </div>`).join('');
  document.getElementById('it-sim').innerHTML=SIMS.map(s=>`
    <div class="sim-card">
      <div class="sim-head"><h4>${s.country}</h4></div>
      ${s.items.map(i=>`<div class="sim-row">${i}</div>`).join('')}
    </div>`).join('');
  document.getElementById('it-phrases').innerHTML=PHRASES.map(p=>`
    <div class="phrase-card">
      <div class="phrase-head"><h4>${p.lang}</h4></div>
      ${p.phrases.map(ph=>`
        <div class="phrase-row">
          <span class="phrase-eng">${ph.e}</span>
          <div class="phrase-right"><div class="phrase-local">${ph.l}</div><div class="phrase-pron">${ph.p}</div></div>
        </div>`).join('')}
    </div>`).join('');
}
function setInfoTab(id,btn){
  document.querySelectorAll('.itab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.it-content').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('it-'+id).classList.add('on');
}

// ═══════════════════════════════════
// RENDER BOOKINGS
// ═══════════════════════════════════
function renderBookings(){
  if(document.getElementById('bookings-content').hasChildNodes())return;

  const confirmedFlights=BOOKINGS.flights.filter(f=>f.status==='confirmed').length;
  const totalFlights=BOOKINGS.flights.length;
  const confirmedHotels=BOOKINGS.hotels.filter(h=>h.status==='confirmed').length;
  const totalHotels=BOOKINGS.hotels.length;

  function flightCard(f){
    const isConf=f.status==='confirmed';
    const hasTimes=f.dep!=='TBC'&&f.dep!=='See e-ticket';
    return`
    <div class="fk-card">
      <div class="fk-header">
        <span class="fk-airline">${f.airlineEmoji} ${f.airline}${f.flight&&f.flight.includes('→')?'':' · '+f.flight}</span>
        <span class="fk-pill ${f.status}">${isConf?'✓ Confirmed':'To Book'}</span>
      </div>
      <div class="fk-route">
        <div class="fk-city">
          <div class="fk-code">${f.fromCode}</div>
          <div class="fk-city-name">${f.from}</div>
          ${f.fromTerminal?`<span class="fk-terminal">Terminal ${f.fromTerminal}</span>`:''}
        </div>
        <div class="fk-mid">
          <div class="fk-dur">${f.duration}</div>
          <div class="fk-arrow">
            <div class="fk-line"></div>
            <div class="fk-arrowhead">›</div>
          </div>
          <div class="fk-nonstop">${f.nonstop?'Non-stop':'Via stop'}</div>
        </div>
        <div class="fk-city" style="text-align:right">
          <div class="fk-code">${f.toCode}</div>
          <div class="fk-city-name">${f.to}</div>
          ${f.toTerminal?`<span class="fk-terminal">Terminal ${f.toTerminal}</span>`:''}
        </div>
      </div>
      ${hasTimes?`
      <div class="fk-times">
        <div class="fk-time-block"><div class="fk-time">${f.dep}</div><div class="fk-date">${f.date}</div></div>
        <div class="fk-time-block"><div class="fk-time">${f.arr}</div><div class="fk-date">${f.date}</div></div>
      </div>`:`
      <div style="padding:6px 14px 0"><span style="font-size:12px;color:var(--text2)">📅 ${f.date}</span></div>`}
      <div class="fk-divider"></div>
      <div class="fk-ref">
        <span class="fk-ref-label">Booking Ref</span>
        <span class="fk-ref-val">${f.ref}</span>
      </div>
      <div class="fk-details">
        <div class="fk-detail-item"><div class="fk-detail-label">Passengers</div><div class="fk-detail-val">${f.pax.join('<br>')}</div></div>
        <div class="fk-detail-item"><div class="fk-detail-label">Cabin</div><div class="fk-detail-val">${f.cabin}</div></div>
        <div class="fk-detail-item"><div class="fk-detail-label">Baggage</div><div class="fk-detail-val">${f.bags}</div></div>
        ${f.seats&&!f.seats.includes('TBC')&&!f.seats.includes('e-ticket')?`<div class="fk-detail-item"><div class="fk-detail-label">Seats</div><div class="fk-detail-val">${f.seats}</div></div>`:''}
      </div>
    </div>`;
  }

  function trainCard(t){
    return`
    <div class="tk-card">
      <div class="tk-header">
        <div class="tk-type"><div class="tk-icon">${t.icon}</div><div class="tk-name">${t.operator}</div></div>
        <span class="fk-pill ${t.status}">${t.status==='confirmed'?'✓ Confirmed':'To Book'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div><div style="font-size:15px;font-weight:800">${t.from.split('(')[0].trim()}</div><div style="font-size:11px;color:var(--text2)">${t.from.includes('(')?t.from.match(/\(([^)]+)\)/)[1]:''}</div></div>
        <div style="flex:1;height:1px;background:var(--border);position:relative"><div style="position:absolute;right:-4px;top:-5px;color:var(--text3)">›</div></div>
        <div style="text-align:right"><div style="font-size:15px;font-weight:800">${t.to.split('(')[0].trim()}</div><div style="font-size:11px;color:var(--text2)">${t.to.includes('(')?t.to.match(/\(([^)]+)\)/)[1]:''}</div></div>
      </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        <div><div class="fk-detail-label">Date</div><div class="fk-detail-val">${t.date}</div></div>
        <div><div class="fk-detail-label">Duration</div><div class="fk-detail-val">${t.duration}</div></div>
        <div><div class="fk-detail-label">Ref / How to Book</div><div class="fk-detail-val">${t.ref}</div></div>
      </div>
      ${t.note?`<div style="margin-top:8px;padding:7px 9px;background:var(--amber-bg);border-radius:8px;font-size:12px;color:#7A4000">💡 ${t.note}</div>`:''}
    </div>`;
  }

  function ferryCard(f){
    return`
    <div class="tk-card">
      <div class="tk-header">
        <div class="tk-type"><div class="tk-icon">${f.icon}</div><div class="tk-name">${f.operator}</div></div>
        <span class="fk-pill ${f.status}">${f.status==='confirmed'?'✓ Confirmed':'To Book'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${f.from}</div></div>
        <div style="color:var(--text3);font-size:16px">⇄</div>
        <div style="flex:1;text-align:right"><div style="font-size:13px;font-weight:700">${f.to}</div></div>
      </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px">
        <div><div class="fk-detail-label">Outbound</div><div class="fk-detail-val">${f.outbound}</div></div>
        <div><div class="fk-detail-label">Return</div><div class="fk-detail-val">${f.ret}</div></div>
        <div><div class="fk-detail-label">Duration</div><div class="fk-detail-val">${f.duration}</div></div>
      </div>
      ${f.note?`<div style="padding:7px 9px;background:var(--amber-bg);border-radius:8px;font-size:12px;color:#7A4000">💡 ${f.note}</div>`:''}
    </div>`;
  }

  function hotelCard(h){
    return`
    <div class="hk-card">
      <div class="hk-icon">🏨</div>
      <div class="hk-body">
        <div class="hk-city">${h.city}</div>
        <div class="hk-dates">${h.dates} · ${h.nights}</div>
        <div class="hk-detail">${h.detail}</div>
        <div class="hk-ref">Ref: ${h.ref}</div>
      </div>
      <span class="hk-pill ${h.status}">${h.status==='confirmed'?'✓ Done':'TBC'}</span>
    </div>`;
  }

  document.getElementById('bookings-content').innerHTML=`
    <div class="bk-summary">
      <div class="bk-sum-item"><div class="bk-sum-num" style="color:var(--green)">${confirmedFlights}</div><div class="bk-sum-label">Confirmed</div></div>
      <div class="bk-sum-item"><div class="bk-sum-num" style="color:var(--amber)">${totalFlights-confirmedFlights}</div><div class="bk-sum-label">To Book</div></div>
      <div class="bk-sum-item"><div class="bk-sum-num" style="color:var(--text)">${totalFlights}</div><div class="bk-sum-label">Total Legs</div></div>
    </div>

    <div class="bk-section">
      <div class="bk-section-head">
        <span class="bk-section-icon">✈️</span>
        <span class="bk-section-title">Flights</span>
        <span class="bk-section-count mixed">${confirmedFlights}/${totalFlights} confirmed</span>
      </div>
      ${BOOKINGS.flights.map(flightCard).join('')}
    </div>

    <div class="bk-section">
      <div class="bk-section-head">
        <span class="bk-section-icon">🚄</span>
        <span class="bk-section-title">Train</span>
        <span class="bk-section-count tbc">To Book</span>
      </div>
      ${BOOKINGS.trains.map(trainCard).join('')}
    </div>

    <div class="bk-section">
      <div class="bk-section-head">
        <span class="bk-section-icon">⛴️</span>
        <span class="bk-section-title">Ferry</span>
        <span class="bk-section-count tbc">To Book</span>
      </div>
      ${BOOKINGS.ferries.map(ferryCard).join('')}
    </div>

    <div class="bk-section">
      <div class="bk-section-head">
        <span class="bk-section-icon">🏨</span>
        <span class="bk-section-title">Hotels</span>
        <span class="bk-section-count mixed">${confirmedHotels}/${totalHotels} confirmed</span>
      </div>
      ${BOOKINGS.hotels.map(hotelCard).join('')}
    </div>
  `;
}
</script>
</body>
</html>
