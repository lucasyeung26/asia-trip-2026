<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>🌏 Asia Trip 2026 — Lucas & Caitlin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --teal:#059669; --teal-bg:#ECFDF5; --amber:#D97706; --amber-bg:#FFFBEB;
  --red:#DC2626; --blue:#2563EB; --purple:#7C3AED;
  --surface:#fff; --bg:#F8FAFC; --border:#E2E8F0;
  --text:#1E293B; --muted:#64748B;
  --hdr:56px; --radius:14px; --shadow:0 4px 24px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ─── HEADER ─── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);z-index:1000;
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
#hdr .logo{font-size:15px;font-weight:700;color:var(--text);flex:1;line-height:1.2}
#hdr .logo span{font-size:11px;font-weight:400;color:var(--muted);display:block}
.hdr-btn{
  display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--text);transition:.15s;white-space:nowrap;
}
.hdr-btn:active{transform:scale(.96)}
.hdr-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
#view-toggle{display:flex;background:#F1F5F9;border-radius:22px;padding:3px;gap:2px}
.vtab{
  padding:5px 11px;border-radius:18px;font-size:12px;font-weight:600;
  cursor:pointer;color:var(--muted);transition:.15s;border:none;background:none;
}
.vtab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}

/* ─── MAP ─── */
#map-wrap{position:fixed;top:var(--hdr);left:0;right:0;bottom:0;z-index:1}
#map{width:100%;height:100%}

/* ─── TIMELINE ─── */
#timeline-wrap{
  position:fixed;top:var(--hdr);left:0;right:0;bottom:0;z-index:1;
  overflow-y:auto;padding:16px 12px 80px;display:none;
}
.tl-day{
  background:#fff;border-radius:var(--radius);margin-bottom:10px;
  border:1px solid var(--border);overflow:hidden;
}
.tl-day-head{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;
}
.tl-day-num{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
.tl-day-info{flex:1}
.tl-day-title{font-size:14px;font-weight:700;color:var(--text)}
.tl-day-sub{font-size:12px;color:var(--muted);margin-top:1px}
.tl-day-body{display:none;border-top:1px solid var(--border)}
.tl-day-body.open{display:block}
.tl-slot{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid #F1F5F9}
.tl-slot:last-child{border-bottom:none}
.tl-time{font-size:11px;font-weight:600;color:var(--muted);width:64px;flex-shrink:0;padding-top:2px}
.tl-slot-body{}
.tl-slot-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-slot-desc{font-size:12px;color:var(--muted);line-height:1.5}
.tl-tip{
  margin:0 14px 12px;padding:8px 10px;background:#FFFBEB;border-radius:8px;
  font-size:11.5px;color:#92400E;border-left:3px solid #F59E0B;
}

/* ─── CITY PANEL ─── */
.panel-overlay{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0);
  pointer-events:none;transition:background .25s;
}
.panel-overlay.vis{background:rgba(0,0,0,.35);pointer-events:auto}
.panel{
  position:fixed;left:0;right:0;bottom:0;z-index:500;
  background:#fff;border-radius:22px 22px 0 0;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);
  max-height:92vh;display:flex;flex-direction:column;
}
.panel.open{transform:translateY(0)}
.p-handle{width:36px;height:4px;background:#CBD5E1;border-radius:2px;margin:10px auto 0}
.p-head{
  display:flex;align-items:center;gap:10px;padding:12px 16px 10px;
  flex-shrink:0;
}
.p-flag{font-size:28px}
.p-info{flex:1}
.p-name{font-size:18px;font-weight:800;color:var(--text)}
.p-dates{font-size:12px;color:var(--muted);margin-top:1px}
.p-badge{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;
}
.p-close{
  width:30px;height:30px;border-radius:50%;background:#F1F5F9;border:none;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  cursor:pointer;color:var(--muted);flex-shrink:0;
}
.p-tabs{
  display:flex;border-bottom:1px solid var(--border);padding:0 12px;
  flex-shrink:0;overflow-x:auto;
}
.p-tabs::-webkit-scrollbar{display:none}
.ptab{
  padding:8px 12px;font-size:12px;font-weight:600;color:var(--muted);
  border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;
  transition:.15s;border-top:none;border-left:none;border-right:none;
  background:none;
}
.ptab.on{color:var(--teal);border-bottom-color:var(--teal)}
.p-body{overflow-y:auto;flex:1;padding:12px}

/* ─── CARDS ─── */
.t-content{display:none}
.t-content.on{display:block}
.card{
  background:var(--bg);border-radius:var(--radius);padding:12px;
  margin-bottom:8px;border:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.card-icon{
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0;
}
.card-body{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.5}
.card-type{
  font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  color:var(--muted);margin-bottom:3px;
}
.map-link{
  display:inline-flex;align-items:center;gap:3px;margin-top:5px;
  font-size:11px;font-weight:600;color:var(--teal);text-decoration:none;
  background:var(--teal-bg);padding:3px 8px;border-radius:10px;
}
.map-link:active{opacity:.7}
.map-link::before{content:'📍';font-size:10px}

/* Transport cards */
.tc{
  background:#fff;border-radius:var(--radius);padding:11px 12px;
  margin-bottom:8px;border:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.tc-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;
}
.tc-dot.confirmed{background:#10B981}
.tc-dot.tbc{background:#F59E0B}
.tc-dot.alt{background:#94A3B8}
.tc-body{flex:1}
.tc-method{font-size:12px;font-weight:700;color:var(--text)}
.tc-detail{font-size:12px;color:var(--muted);margin-top:1px;line-height:1.5}
.tc-ref{font-size:11px;font-weight:600;color:var(--teal);margin-top:3px}
.tc-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;
  flex-shrink:0;
}
.tc-badge.confirmed{background:#ECFDF5;color:#065F46}
.tc-badge.tbc{background:#FFFBEB;color:#92400E}
.tc-badge.alt{background:#F1F5F9;color:#475569}

/* Section header */
.sec-head{
  font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);
  text-transform:uppercase;margin:14px 0 8px;padding-left:2px;
}
.sec-head:first-child{margin-top:0}

/* Hotel card */
.hotel-card{
  background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border:1px solid #6EE7B7;
  border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.hotel-card .hotel-icon{font-size:22px}
.hotel-card .hotel-name{font-size:13px;font-weight:700;color:#065F46}
.hotel-card .hotel-sub{font-size:11.5px;color:#059669;margin-top:1px}

/* Info panel */
#info-panel{
  position:fixed;top:0;right:0;bottom:0;width:min(380px,100vw);z-index:800;
  background:#fff;box-shadow:-4px 0 32px rgba(0,0,0,.15);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
}
#info-panel.open{transform:translateX(0)}
#info-overlay{
  position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0);
  pointer-events:none;transition:background .25s;
}
#info-overlay.vis{background:rgba(0,0,0,.35);pointer-events:auto}
.info-head{
  display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--border);
  flex-shrink:0;gap:10px;padding-top:calc(16px + env(safe-area-inset-top,0px));
}
.info-head h2{font-size:17px;font-weight:800;flex:1}
.info-close{
  width:30px;height:30px;border-radius:50%;background:#F1F5F9;border:none;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  cursor:pointer;color:var(--muted);
}
.info-tabs{
  display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 12px;
  overflow-x:auto;
}
.info-tabs::-webkit-scrollbar{display:none}
.itab{
  padding:10px 12px;font-size:12px;font-weight:600;color:var(--muted);
  border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;
  transition:.15s;border-top:none;border-left:none;border-right:none;background:none;
}
.itab.on{color:var(--blue);border-bottom-color:var(--blue)}
.info-body{overflow-y:auto;flex:1;padding:14px}
.it-content{display:none}
.it-content.on{display:block}

/* Booking card */
.bk-card{
  background:#F8FAFC;border:1px solid var(--border);border-radius:12px;
  padding:11px 13px;margin-bottom:8px;
}
.bk-card .bk-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bk-dot{width:8px;height:8px;border-radius:50%}
.bk-dot.confirmed{background:#10B981}
.bk-dot.tbc{background:#F59E0B}
.bk-title{font-size:13px;font-weight:700;color:var(--text)}
.bk-detail{font-size:12px;color:var(--muted);line-height:1.5}
.bk-ref{font-size:11px;font-weight:700;color:var(--blue);margin-top:3px}

/* Emergency card */
.em-country{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
}
.em-country-head{
  padding:10px 13px;background:#FEF2F2;border-bottom:1px solid #FECACA;
  display:flex;align-items:center;gap:8px;
}
.em-country-head span{font-size:14px}
.em-country-head h4{font-size:13px;font-weight:700;color:#7F1D1D}
.em-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-bottom:1px solid var(--border);
}
.em-item:last-child{border-bottom:none}
.em-label{font-size:12px;color:var(--muted)}
.em-num{font-size:13px;font-weight:700;color:var(--red);text-decoration:none}

/* SIM card */
.sim-country{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
}
.sim-head{
  padding:10px 13px;background:#EFF6FF;border-bottom:1px solid #BFDBFE;
  display:flex;align-items:center;gap:8px;
}
.sim-head span{font-size:14px}
.sim-head h4{font-size:13px;font-weight:700;color:#1E3A8A}
.sim-item{padding:9px 13px;border-bottom:1px solid #F1F5F9;font-size:12px;color:var(--muted);line-height:1.5}
.sim-item:last-child{border-bottom:none}
.sim-item strong{color:var(--text);font-weight:600}

/* Phrases */
.phrase-lang{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
}
.phrase-head{
  padding:10px 13px;background:#F5F3FF;border-bottom:1px solid #DDD6FE;
  display:flex;align-items:center;gap:8px;
}
.phrase-head span{font-size:14px}
.phrase-head h4{font-size:13px;font-weight:700;color:#4C1D95}
.phrase-item{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 13px;border-bottom:1px solid #F1F5F9;gap:12px;
}
.phrase-item:last-child{border-bottom:none}
.phrase-eng{font-size:12px;color:var(--muted);flex:1}
.phrase-local{font-size:12px;font-weight:600;color:var(--text);text-align:right;max-width:55%}
.phrase-pron{font-size:10.5px;color:var(--purple);margin-top:1px}

/* Pulse marker */
@keyframes pulse{0%{transform:scale(1);opacity:.8}70%{transform:scale(2.2);opacity:0}100%{transform:scale(2.2);opacity:0}}
.city-marker{
  width:26px;height:26px;border-radius:50%;border:2.5px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,.25);cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;font-size:12px;
}
.city-marker::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  animation:pulse 2s ease-out infinite;border:2px solid currentColor;
}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}

/* Legend */
#legend{
  position:absolute;bottom:20px;left:12px;z-index:10;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-radius:10px;padding:8px 11px;font-size:11px;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:var(--muted)}
.leg-item:last-child{margin-bottom:0}
.leg-line{width:24px;height:3px;border-radius:2px}
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<div id="hdr">
  <div class="logo">
    🌏 Asia 2026
    <span>Lucas &amp; Caitlin · 14 Jul – 3 Aug</span>
  </div>
  <div id="view-toggle">
    <button class="vtab active" id="btn-map" onclick="setView('map')">🗺️ Map</button>
    <button class="vtab" id="btn-days" onclick="setView('days')">📅 Days</button>
  </div>
  <button class="hdr-btn" onclick="toggleInfo()">ℹ️ Info</button>
</div>

<!-- ─── MAP VIEW ─── -->
<div id="map-wrap">
  <div id="map"></div>
  <div id="legend">
    <div class="leg-item"><div class="leg-line" style="background:#10B981"></div> Confirmed</div>
    <div class="leg-item"><div class="leg-line" style="background:#F59E0B;border-top:3px dashed #F59E0B;height:0"></div> To Book</div>
  </div>
</div>

<!-- ─── TIMELINE VIEW ─── -->
<div id="timeline-wrap">
  <div id="timeline-content"></div>
</div>

<!-- ─── CITY PANEL OVERLAY ─── -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>

<!-- ─── CITY PANEL ─── -->
<div class="panel" id="panel">
  <div class="p-handle"></div>
  <div class="p-head" id="p-head"></div>
  <div class="p-tabs" id="p-tabs"></div>
  <div class="p-body" id="p-body"></div>
</div>

<!-- ─── INFO OVERLAY ─── -->
<div id="info-overlay" onclick="closeInfo()"></div>

<!-- ─── INFO PANEL ─── -->
<div id="info-panel">
  <div class="info-head">
    <h2>ℹ️ Trip Info</h2>
    <button class="info-close" onclick="closeInfo()">✕</button>
  </div>
  <div class="info-tabs">
    <button class="itab on" onclick="setInfoTab('bookings',this)">📋 Bookings</button>
    <button class="itab" onclick="setInfoTab('emergency',this)">🚨 Emergency</button>
    <button class="itab" onclick="setInfoTab('sim',this)">📱 SIM Cards</button>
    <button class="itab" onclick="setInfoTab('phrases',this)">💬 Phrases</button>
  </div>
  <div class="info-body">
    <div class="it-content on" id="it-bookings"></div>
    <div class="it-content" id="it-emergency"></div>
    <div class="it-content" id="it-sim"></div>
    <div class="it-content" id="it-phrases"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════

function mapsLink(name, city) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + city)}`;
}

const CITIES = {
  hk: {
    name:'Hong Kong', flag:'🇭🇰', dates:'14–16 Jul', badge:'2 nights',
    color:'#F97316', colorBg:'#FFF7ED', latlng:[22.3193,114.1694],
    hotel:'Staying with family',
    explore:[
      {icon:'🌅',bg:'#FFF7ED',title:'Victoria Peak',desc:'Best city skyline views — go at sunset or after 8pm for the full light show. Take the Peak Tram up.'},
      {icon:'🛶',bg:'#EFF6FF',title:'Star Ferry Crossing',desc:'$2.70 HKD — most iconic harbour crossing in Asia. Day or night, always worth it.'},
      {icon:'🏮',bg:'#FDF4FF',title:'Temple Street Night Market',desc:'Kowloon\'s famous night market. Street food, fortune tellers, jade stalls. Start at 7pm.'},
      {icon:'🗿',bg:'#F0FFF4',title:'Tian Tan Buddha (Lantau)',desc:'Giant outdoor Buddha on Lantau Island. Take the Ngong Ping cable car for dramatic approach.'},
      {icon:'🛍️',bg:'#ECFDF5',title:'Mong Kok Markets',desc:'Ladies Market (Tung Choi St), Goldfish Market, Flower Market. Dense, chaotic, amazing.'},
    ],
    food:[
      {icon:'🥟',bg:'#FFF7ED',type:'Dim Sum',title:'Tim Ho Wan',desc:'World\'s cheapest Michelin-star dim sum. Order the baked BBQ pork buns. Expect a queue — worth it.'},
      {icon:'🦢',bg:'#ECFDF5',type:'Cantonese Classic',title:'Yung Kee Restaurant',desc:'Famous for roast goose. Been open since 1942. Get the roast goose and century egg side.'},
      {icon:'🍜',bg:'#EFF6FF',type:'Wonton Noodles',title:'Mak\'s Noodle',desc:'The definitive Hong Kong wonton noodle. Springy noodles, delicate pork-shrimp wontons in clear broth.'},
      {icon:'☕',bg:'#FDF4FF',type:'Cha Chaan Teng',title:'Tsui Wah Restaurant',desc:'Classic 24hr Hong Kong diner. Milk tea, pineapple buns with butter, French toast. Ideal breakfast.'},
      {icon:'🍚',bg:'#F0FFF4',type:'Congee',title:'Law Fu Kee Congee',desc:'Hidden in Sheung Wan. Silky congee with preserved egg and pork, or fish. Open early morning.'},
      {icon:'🍖',bg:'#FEF2F2',type:'BBQ Roast Meat',title:'Joy Hing Roasted Meat',desc:'Char siu and roast pork over rice. Wan Chai institution. Small, crowded, cash only — go early.'},
      {icon:'🥩',bg:'#FFFBEB',type:'Sichuan',title:'Da Ping Huo',desc:'Private kitchen-style Sichuan. Theatrical, intimate, excellent. Book in advance.'},
      {icon:'🍵',bg:'#F5F3FF',type:'Egg Waffles',title:'Lee Keung Kee North Point',desc:'Original North Point egg waffles (鷄蛋仔). Crispy outside, soft inside. Street food icon.'},
      {icon:'🦐',bg:'#ECFDF5',type:'Seafood',title:'Lei Yue Mun Seafood Village',desc:'Pick live seafood from tanks, have it cooked to order. Unique HK experience. Take a taxi.'},
    ],
    transport:[
      {status:'confirmed',method:'✈️ Arrive Hong Kong',detail:'Arriving HKG — Lantau Island airport. Airport Express to Hong Kong Station (24 min, HK$115).'},
      {status:'confirmed',method:'🚇 Getting Around',detail:'MTR subway covers everything. Octopus card is essential — tap in/out everywhere including buses and 7-Eleven.'},
    ],
    nextstop:{destination:'Chengdu 🇨🇳',options:[
      {status:'tbc',method:'✈️ HKG → CTU',detail:'Cathay or Air China direct ~2.5 hrs. Book via carrier site.'},
    ]}
  },

  chengdu: {
    name:'Chengdu', flag:'🇨🇳', dates:'16–18 Jul', badge:'2 nights',
    color:'#EF4444', colorBg:'#FEF2F2', latlng:[30.5728,104.0668],
    hotel:'TBC — Chengdu',
    explore:[
      {icon:'🐼',bg:'#ECFDF5',title:'Giant Panda Research Base',desc:'Go at 8am sharp — pandas are active and eating. Take a taxi (30 min from centre). Book online in advance.'},
      {icon:'🏛️',bg:'#EFF6FF',title:'Wuhou Shrine & Jinli Street',desc:'Han dynasty memorial complex + adjacent old street with street food, tea houses, and craftwork.'},
      {icon:'🫖',bg:'#FDF4FF',title:'Kuanzhai Alley (Wide & Narrow Lanes)',desc:'Preserved Qing dynasty alleyways. Tea houses, local snacks, street performers. Best at dusk.'},
      {icon:'🌊',bg:'#FFF7ED',title:'Dujiangyan Irrigation System',desc:'UNESCO World Heritage 2,300-year-old water system. 45 min from city — worth a half-day.'},
      {icon:'🌙',bg:'#F0FFF4',title:'Chunxi Road Night Scene',desc:'Chengdu\'s glittering shopping and food street. Great for street food and people-watching at night.'},
    ],
    food:[

// Arcs
function arcPoints(p1, p2, n=80) {
  const dLat=p2[0]-p1[0], dLng=p2[1]-p1[1];
  const dist=Math.sqrt(dLat*dLat+dLng*dLng);
  const off=dist*0.28;
  const cpLat=(p1[0]+p2[0])/2-(dLng/dist)*off;
  const cpLng=(p1[1]+p2[1])/2+(dLat/dist)*off;
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    pts.push([
      (1-t)*(1-t)*p1[0]+2*(1-t)*t*cpLat+t*t*p2[0],
      (1-t)*(1-t)*p1[1]+2*(1-t)*t*cpLng+t*t*p2[1]
    ]);
  }
  return pts;
}

function drawArc(pts,color,dashed,delay){
  const line=L.polyline([],{color,weight:2.5,opacity:.85,dashArray:dashed?'6,5':null}).addTo(map);
  let i=1;
  setTimeout(()=>{
    const t=setInterval(()=>{
      if(i>pts.length){clearInterval(t);return;}
      line.setLatLngs(pts.slice(0,i)); i+=3;
    },16);
  },delay);
}

const COORDS={
  hk:[22.3193,114.1694], chengdu:[30.5728,104.0668], chongqing:[29.5630,106.5516],
  bangkok:[13.7563,100.5018], krabi:[8.0863,98.9063], phuket:[7.8804,98.3923],
  singapore:[1.3521,103.8198], bintan:[1.0634,104.3521], kl:[3.1390,101.6869]
};

const ROUTE=[
  ['hk','chengdu',false],['chengdu','chongqing',false],['chongqing','bangkok',false],
  ['bangkok','krabi',false],['krabi','phuket',true],['phuket','singapore',false],
  ['singapore','bintan',true],['bintan','kl',true]
];

ROUTE.forEach(([a,b,tbc],i)=>{
  const pts=arcPoints(COORDS[a],COORDS[b]);
  drawArc(pts, tbc?'#F59E0B':'#10B981', tbc, 300+i*180);
});

  const body=document.getElementById(`tl-body-${i}`);

  arr.style.transform=open?'rotate(90deg)':'';
}

    </div>
  `).join('');

  const transportHtml=c.transport.map(t=>`

      <div class="tc-dot ${t.status}"></div>
      <div class="tc-body">
        <div class="tc-method">${t.method}</div>

        ${t.ref?`<div class="tc-ref">Ref: ${t.ref}</div>`:''}

      <div class="tc-badge ${t.status}">${t.status==='confirmed'?'✓ Confirmed':t.status==='tbc'?'TBC':'Alt'}</div>

      <div class="tc">

function setTab(id,btn){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.t-content').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('t-'+id).classList.add('on');
  document.getElementById('p-body').scrollTop=0;
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('vis');
}

// Swipe to close
let touchStartY=0;
document.getElementById('panel').addEventListener('touchstart',e=>{ touchStartY=e.touches[0].clientY; });
document.getElementById('panel').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-touchStartY>80) closePanel();
});
